services:
  - type: web
    name: file-share-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: file-share-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: FILES_DIR
        value: /var/data/files
      - key: DB_PATH
        value: /var/data/downloads.db
      - key: COUNT_DEDUPE_SECONDS
        value: "60"
