services:
  - type: web
    name: file-share-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: file-share-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/downloads.db
      - key: COUNT_DEDUPE_SECONDS
        value: "60"
      - key: GITHUB_OWNER
        value: Hungvip69
      - key: GITHUB_REPO
        value: WEB-DOWNLOAD
      - key: GITHUB_RELEASE_TAG
        value: files
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_CACHE_SECONDS
        value: "60"
